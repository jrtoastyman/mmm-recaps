<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mimosa March Madness 2026 — Recaps</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #111118;
    --dark-2: #1a1a24;
    --dark-3: #22222e;
    --border: rgba(201,168,76,0.18);
    --text: #e8e4d8;
    --text-muted: #8a8578;
    --text-dim: #5a5650;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(201,168,76,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 24px; }

  header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  h1 {
    font-family: var(--serif);
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 400;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 10px;
  }

  h1 em { font-style: italic; color: var(--gold-light); }

  .tagline {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .card {
    background: var(--dark-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.2s, transform 0.15s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover { border-color: rgba(201,168,76,0.4); transform: translateY(-2px); background: var(--dark-3); }
  .card:hover::before { opacity: 1; }
  .card.latest { border-color: rgba(201,168,76,0.35); background: var(--dark-3); }
  .card.latest::before { opacity: 0.6; }

  .card-meta { display: flex; align-items: center; justify-content: space-between; }
  .card-round { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); }
  .card-date { font-size: 11px; color: var(--text-dim); }
  .card-title { font-family: var(--serif); font-size: 18px; font-weight: 400; color: #fff; line-height: 1.25; }
  .card-blurb { font-size: 13px; color: var(--text-muted); line-height: 1.6; font-weight: 300; }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .card-stats { display: flex; gap: 14px; }
  .card-stat { font-size: 11px; color: var(--text-dim); }
  .card-stat span { color: var(--text-muted); font-weight: 500; }
  .card-arrow { font-size: 14px; color: var(--text-dim); transition: color 0.2s, transform 0.2s; }
  .card:hover .card-arrow { color: var(--gold); transform: translateX(3px); }

  .new-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--dark);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 3px;
    padding: 2px 6px;
    vertical-align: middle;
    margin-left: 6px;
  }

  .card-placeholder {
    background: transparent;
    border: 1px dashed rgba(201,168,76,0.2);
    border-radius: 12px;
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 160px;
    text-align: center;
  }

  .placeholder-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px dashed rgba(201,168,76,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--text-dim);
  }

  .placeholder-label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 400;
    letter-spacing: 0.04em;
  }

  .placeholder-sub {
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.6;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 28px 0 40px;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  footer a { color: var(--text-dim); text-decoration: none; }
  footer a:hover { color: var(--gold); }

  @media (max-width: 520px) {
    .grid { grid-template-columns: 1fr; }
    header { padding: 40px 0 28px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Mimosa March Madness · 2026</div>
    <h1>The <em>Recap</em> Archive</h1>
    <p class="tagline">Recaps will appear here as the tournament progresses. Check back after games.</p>
  </header>

  <div class="section-label">All recaps — newest first</div>

  <div class="grid">

    <!--
    =====================================================================
    HOW TO ADD A NEW RECAP CARD:

    1. Copy the example block below and paste it ABOVE this comment
    2. Update href, card-round, card-date, card-title, card-blurb, and card-stats
    3. On the newest card: add class="card latest" and <span class="new-badge">New</span> in the title
    4. On all older cards: use just class="card" and remove the new-badge span
    5. Remove the placeholder card once your first real recap is added
    6. Save and upload to GitHub — live in ~60 seconds

    EXAMPLE (copy from here):

    <a href="r1-day1.html" class="card latest">
      <div class="card-meta">
        <div class="card-round">First Round · Day 1</div>
        <div class="card-date">Mar 20</div>
      </div>
      <div class="card-title">Your Title Here<span class="new-badge">New</span></div>
      <div class="card-blurb">One or two sentences previewing the recap. Keep it punchy.</div>
      <div class="card-footer">
        <div class="card-stats">
          <div class="card-stat"><span>000</span> entries</div>
          <div class="card-stat"><span>0</span> upsets</div>
        </div>
        <div class="card-arrow">→</div>
      </div>
    </a>

    =====================================================================
    -->

    <!-- Remove this placeholder once the first real recap card is added above -->
    <div class="card-placeholder">
      <div class="placeholder-icon">◷</div>
      <div class="placeholder-label">First recap coming soon</div>
      <div class="placeholder-sub">Check back after tip-off</div>
    </div>

  </div>

  <footer>
    <div>© 2026 James Rosemergy · Mimosa March Madness</div>
    <div><a href="https://thebigtourney.com/madness/site452300/leaderboard/1">Live standings →</a></div>
  </footer>

</div>
</body>
</html>
